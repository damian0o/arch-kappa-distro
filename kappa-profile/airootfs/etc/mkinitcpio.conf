# mkinitcpio configuration for Kappa Linux live ISO.
# autodetect is intentionally removed — it cannot detect the root filesystem
# in a chroot/container build environment, and a live ISO must include all
# modules anyway so it can boot on any hardware.
MODULES=()
BINARIES=()
FILES=()
HOOKS=(base systemd microcode modconf kms keyboard keymap sd-vconsole block filesystems fsck)
